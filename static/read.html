<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reader</title>
    <meta name="foliate-base" content="/static/foliate-4245ee822dc8" />
    <!-- No favicon links: the reader CSP (img-src blob: data:) blocks them, so they
         would only generate console noise. -->
    <style>
      :root{--reader-bg:#faf8f5;--reader-text:#2b2620;--reader-muted:#8a8177;--reader-accent:#b8552f;--reader-border:#e5dfd6;--reader-bar-height:3rem}@media (prefers-color-scheme:dark){:root{--reader-bg:#1c1a17;--reader-text:#e8e3db;--reader-muted:#918a80;--reader-accent:#d97a52;--reader-border:#35322d}}*{box-sizing:border-box}body,html{background:var(--reader-bg);color:var(--reader-text);font-family:system-ui,sans-serif;height:100%;margin:0}.reader{display:flex;flex-direction:column;height:100%}.reader__bar{align-items:center;border-bottom:1px solid var(--reader-border);display:flex;flex:none;gap:1rem;height:var(--reader-bar-height);padding:0 1rem}.reader__download,.reader__return{color:var(--reader-accent);font-size:.875rem;text-decoration:none;white-space:nowrap}.reader__download:hover,.reader__return:hover{text-decoration:underline}.reader__title{color:var(--reader-muted);flex:1;font-size:.875rem;min-width:0;overflow:hidden;text-align:center;text-overflow:ellipsis;white-space:nowrap}.reader__nav-btn,.reader__toc-toggle{-webkit-appearance:none;-moz-appearance:none;appearance:none;background:none;border:1px solid var(--reader-border);border-radius:.375rem;color:var(--reader-text);cursor:pointer;font-size:.875rem;padding:.25rem .75rem}.reader__nav-btn:hover,.reader__toc-toggle:hover{border-color:var(--reader-accent);color:var(--reader-accent)}.reader__toc{background:var(--reader-bg);border-right:1px solid var(--reader-border);bottom:0;left:0;overflow-y:auto;padding:1rem;position:fixed;top:var(--reader-bar-height);width:min(20rem,85vw);z-index:10}.reader__toc ol{list-style:none;margin:0;padding-left:0}.reader__toc ol ol{padding-left:1rem}.reader__toc a{color:var(--reader-text);display:block;font-size:.875rem;padding:.25rem 0;text-decoration:none}.reader__toc a:hover{color:var(--reader-accent)}.reader__view{flex:1;min-height:0;position:relative}.reader__view>*{height:100%;width:100%}.reader__footer{align-items:center;border-top:1px solid var(--reader-border);display:flex;flex:none;gap:1rem;justify-content:space-between;padding:.5rem 1rem}.reader__position{color:var(--reader-muted);font-size:.75rem}.reader-fallback{line-height:1.6;margin:4rem auto;max-width:30rem;padding:0 1.5rem;text-align:center}.reader-fallback a{color:var(--reader-accent)}
    </style>
  </head>
  <body>
    <noscript>
      <div class="reader-fallback">
        <p>This reader needs JavaScript. You can download books directly from the catalog instead.</p>
        <p><a href="/">Back to catalog</a></p>
      </div>
    </noscript>
    <div id="reader" class="reader" hidden>
      <header class="reader__bar">
        <a id="reader-return" class="reader__return" href="/">Catalog</a>
        <button id="reader-toc-toggle" class="reader__toc-toggle" type="button" aria-expanded="false" aria-controls="reader-toc" hidden>
          Contents
        </button>
        <span id="reader-title" class="reader__title"></span>
        <a id="reader-download" class="reader__download" hidden>Download</a>
      </header>
      <nav id="reader-toc" class="reader__toc" hidden aria-label="Table of contents"></nav>
      <main id="reader-view" class="reader__view"></main>
      <footer class="reader__footer">
        <button id="reader-prev" class="reader__nav-btn" type="button" aria-label="Previous page" hidden>&#8592;</button>
        <span id="reader-position" class="reader__position"></span>
        <button id="reader-next" class="reader__nav-btn" type="button" aria-label="Next page" hidden>&#8594;</button>
      </footer>
    </div>
    <div id="reader-error" class="reader-fallback" hidden>
      <p id="reader-error-message"></p>
      <p><a id="reader-error-return" href="/">Back to catalog</a></p>
    </div>
    <script type="module" src="/static/reader.js"></script>
  </body>
</html>
