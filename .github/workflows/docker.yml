name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # build:ui:check regenerates static/ from ui/, which needs the vendored
          # foliate-js submodule; the build job below ships committed static/ only.
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned: Bun.build minified output is only stable within a Bun version;
          # the freshness check below diffs committed static/ artifacts byte-for-byte.
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

      - name: Check static/ artifacts freshness
        run: bun run build:ui:check

      - name: Run tests in Docker
        run: bun run test

      # Routing/security e2e only (nginx.test.ts): reader CSP + cache, 206, /resync CSRF.
      # The event-logging e2e suite is inotify-timing-flaky (docs/known-flaky-tests.md) and
      # stays a local `test:all` check rather than a CI gate.
      - name: Run e2e tests (nginx routing, reader CSP + cache, 206, /resync CSRF)
        run: bun run test:e2e:routing

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
